<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Activity</title>
    <style>
        body{
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
            margin-top:80px;
            background-color: rgb(234, 130, 178);
        }
        .container{
            background-color: white;
            padding:20px;
            width:300px;
            margin:auto;
            border:1px solid #ccc;
        }
        input{ padding:6px;
            width:80%;
            margin-bottom:10px;

        }
        button{
            padding:8px 15px;
        }
        output{
            margin-top: 15px;
            text-align:left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2> Electricity Consumption Classifier  </h2>
        <input type="number" id="score" placeholder="Input kilowatt per hour (0-500+)">
        <br>
        <button onclick="evaluateScore()"> Consumption CLassification</button>
<div class="output">
    <p id="status"></p>
    <p id="grade"></p>

</div>
    </div>
    

<script>
    function evaluateScore(){
        var studentScore = document.getElementById("score").value;
        if (studentScore ===""){
            alert("Please enter a score");
            return;
        }
        studentScore=Number(studentScore)
        var passStatus = "";
        if(studentScore >=0-100){
            passStatus = "Status: Discounted electricity rates";

        }else{
            passStatus ="Status: discounted electricity rates";
        }
        var letterGrade = "";
        if(studentScore >=101-200) {letterGrade="A";}
        else if(studentScore >=201-300){LetterGrade="B";}
        else if(studentScore >=301-500) {LetterGrade="C";}
        else{letterGrade="F";}

        var gradeRemark="";
        switch(letterGrade){
            case "A":
                gradeRemark=" Low Consumption";
                break;

                 case "B":
                gradeRemark=" Typical electricity usage ";
                break;

                 case "C":
                gradeRemark=" High Consumption";
                break;

              default: gradeRemark= " High Consumption";



        }

        document.getElementById("status").innerHTML=passStatus;
        document.getElementById("grade").innerHTML="Grade:"+letterGrade+ "" + gradeRemark;

    }
</script>





</body>
</html>
